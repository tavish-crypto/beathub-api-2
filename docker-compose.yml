version: '3.8'

services:
  api:
    build:
      context: .
    ports:
      - "3000:3000"
    environment:
      - DB_HOST=mongodb://db:27017/nexus_db
      - PORT=3000
    depends_on:
      - db

  db:
    image: mongo:6
    ports:
      - "27017:27017"
    volumes:
      - db-data:/data/db

volumes:
  db-data: